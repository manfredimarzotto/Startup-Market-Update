name: Startup Radar Intelligence

on:
  workflow_dispatch:  # Manual trigger (Generate button / GitHub UI)
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run.py

      - name: Validate output data
        run: |
          python -c "
          import json, sys
          files = ['data/signals.json', 'data/companies.json', 'data/investors.json',
                   'data/people.json', 'data/opportunities.json']
          for f in files:
              data = json.load(open(f))
              if not isinstance(data, list):
                  print(f'ERROR: {f} is not a JSON array', file=sys.stderr)
                  sys.exit(1)
              print(f'  {f}: {len(data)} records')
          print('All data files valid.')
          "

      - name: Commit updated data to main
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html assets/ -f
          git diff --cached --quiet || git commit -m "Update signals and dashboard - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
