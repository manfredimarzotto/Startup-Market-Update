name: Nordic Signal Intelligence Pipeline

on:
  workflow_dispatch:  # Manual trigger from dashboard "Generate" button
  # schedule:
  #   - cron: '0 6 * * *'  # Optional: daily at 06:00 UTC

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Phase 2+ : run pipeline here
      # - name: Run pipeline
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #     NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      #   run: python run.py

      - name: Build dashboard
        run: python build.py

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Copy built output to temp
          cp -r docs /tmp/docs-output

          # Switch to gh-pages branch
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Copy output
          cp -r /tmp/docs-output/* .

          # Commit and push
          git add -A
          git diff --cached --quiet || git commit -m "Update dashboard - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin gh-pages
