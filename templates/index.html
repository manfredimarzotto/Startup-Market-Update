<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startup Intelligence Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">&#x2F2A;</div>
    <div class="header-title">Startup Intelligence Radar</div>
  </div>
  <button class="generate-btn" id="generate-btn">
    <span class="spinner"></span>
    <span class="btn-text">&#x21BB; Generate Today's Opportunities</span>
  </button>
</div>

<!-- SUMMARY CARDS -->
<div class="summary-bar">
  <div class="summary-card">
    <div class="summary-icon companies-icon">&#x1F3E2;</div>
    <div class="summary-info">
      <div class="value" id="count-companies">0</div>
      <div class="label">COMPANIES</div>
    </div>
  </div>
  <div class="summary-card">
    <div class="summary-icon investors-icon">&#x1F4C8;</div>
    <div class="summary-info">
      <div class="value" id="count-investors">0</div>
      <div class="label">INVESTORS</div>
    </div>
  </div>
  <div class="summary-card">
    <div class="summary-icon people-icon">&#x1F464;</div>
    <div class="summary-info">
      <div class="value" id="count-people">0</div>
      <div class="label">PEOPLE</div>
    </div>
  </div>
</div>

<!-- MOBILE SIDEBAR TOGGLE -->
<button class="sidebar-toggle" id="sidebar-toggle">Filters</button>

<!-- MAIN LAYOUT -->
<div class="main-layout">

  <!-- FILTER SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-heading">FILTERS</div>

    <div class="filter-group">
      <span class="filter-label">ENTITY TYPE</span>
      <div class="checkbox-list" id="filter-entity-type"></div>
    </div>

    <div class="filter-divider"></div>

    <div class="filter-group">
      <span class="filter-label">GEOGRAPHY</span>
      <select id="filter-geography">
        <option value="">All Geographies</option>
      </select>
    </div>

    <div class="filter-group">
      <span class="filter-label">COUNTRY</span>
      <select id="filter-country">
        <option value="">All Countries</option>
      </select>
    </div>

    <div class="filter-divider"></div>

    <div class="filter-group">
      <span class="filter-label">SIGNAL TIER</span>
      <div class="checkbox-list" id="filter-signal-tier"></div>
    </div>

    <div class="filter-divider"></div>

    <div class="filter-group">
      <span class="filter-label">SIGNAL TYPE</span>
      <div class="checkbox-list" id="filter-signal-type"></div>
    </div>

    <div class="filter-divider"></div>

    <div class="filter-group">
      <span class="filter-label">RECENCY</span>
      <div class="checkbox-list" id="filter-recency">
        <label class="cb-option"><input type="checkbox" name="recency" value="14"><span class="recency-dot hot"></span> 0–14 days</label>
        <label class="cb-option"><input type="checkbox" name="recency" value="30"><span class="recency-dot warm"></span> 15–30 days</label>
        <label class="cb-option"><input type="checkbox" name="recency" value="45" checked><span class="recency-dot cool"></span> 30–45 days</label>
      </div>
    </div>

    <div class="filter-divider"></div>

    <div class="filter-group">
      <span class="filter-label">SORT BY</span>
      <select id="sort-select">
        <option value="score_desc">Signal Strength</option>
        <option value="recent">Most Recent</option>
        <option value="score_asc">Score (Low to High)</option>
      </select>
    </div>

    <button class="reset-btn" id="reset-filters">&#x21BA; Reset All Filters</button>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="content-header">
      <div class="content-header-left">
        <span class="results-title">TOP OPPORTUNITIES</span>
        <span class="results-separator">&middot;</span>
        <span class="results-count" id="results-count">0 RESULTS</span>
      </div>
      <div class="content-header-right">
        <span class="header-date">{{ generated_date }}</span>
      </div>
    </div>
    <div class="active-filters" id="active-filters"></div>
    <div class="opp-grid" id="opp-grid"></div>
    <div class="empty-state" id="empty-state" style="display:none;">
      <p>No opportunities match the current filters. Try adjusting your criteria.</p>
    </div>
  </div>

</div>

<!-- DATA EMBED -->
<script>
window.__NSI_DATA = {
  opportunities: {{ opportunities_json }},
  signals: {{ signals_json }},
  companies: {{ companies_json }},
  investors: {{ investors_json }},
  people: {{ people_json }}
};
</script>
<script src="app.js"></script>
</body>
</html>
